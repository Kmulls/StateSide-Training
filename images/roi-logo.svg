<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Roi Digital Consulting">
  <defs>
    <linearGradient id="roiMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#efb755"/>
      <stop offset="1" stop-color="#c2602f"/>
    </linearGradient>
  </defs>

  <!-- Mark: rounded square with an upward growth arrow (Return on Investment) -->
  <rect x="2" y="8" width="48" height="48" rx="13" fill="url(#roiMark)"/>
  <path d="M14 40 L23 31 L29 36 L40 24" fill="none" stroke="#fff" stroke-width="3.2"
